name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repo'yu indir
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main   # master branch kullanıyorsan bunu 'master' yap

      # JDK kurulumu
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Gradle cache (cache servisi hata verirse job kesilmesin)
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        continue-on-error: true

      # Gradlew'e çalıştırma izni ver
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Derleme
      - name: Build with Gradle
        run: ./gradlew build
