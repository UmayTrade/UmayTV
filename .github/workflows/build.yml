name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Repo'yu indir
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0    # Tüm geçmişi ve branchleri getir
          ref: main         # Hangi branch çekilecek (main veya master yazabilirsin)

      # Java kurulumu
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Gradle cache
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # Derleme
      - name: Build with Gradle
        run: ./gradlew build
